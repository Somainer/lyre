{% extends "base.html" %}
{% block content %}
<h2>Feed <small>(all urgencies, time desc)</small></h2>
{% if messages %}
  <ul class="mailbox-list">
    {% for m in messages %}
      {% include "partials/mailbox_item.html" %}
    {% endfor %}
  </ul>
  {% if messages|length == 100 %}
    <p><a href="/feed?before_id={{ messages[-1].id }}">older →</a></p>
  {% endif %}
{% else %}
  <p class="empty">mailbox 是空的</p>
{% endif %}
{% endblock %}
