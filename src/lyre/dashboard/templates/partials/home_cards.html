<div class="card">
  <div class="num">{{ in_progress }}</div>

</div>
<div class="card">
  <div class="num">{{ completed_24h }}</div>
  <div class="label">completed 24h</div>
</div>

<div class="card">
  <div class="num">{{ tokens_in_24h }} / {{ tokens_out_24h }}</div>

</div>
